# Infrastructure services for local development and integration testing.
#
# Functions run as local Node processes (via `make dev-fn` or `pnpm dev:fn`),
# NOT inside Docker. This keeps the edit-run cycle fast — no rebuild needed.
#
# Usage:
#   docker compose up -d          # Start infra (postgres, graphql, mailpit)
#   docker compose down           # Stop everything
#   docker compose logs -f        # Follow logs

services:
  postgres:
    image: ghcr.io/constructive-io/docker/postgres-plus:18
    environment:
      POSTGRES_DB: constructive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    image: ghcr.io/constructive-io/constructive:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
      PGDATABASE: constructive
    entrypoint: ["bash", "-c"]
    command:
      - |
        cd /app
        echo "Creating database $$PGDATABASE"
        createdb -h "$$PGHOST" -U "$$PGUSER" "$$PGDATABASE" || true

        echo "Applying bootstrap roles"
        pgpm admin-users bootstrap --yes
        pgpm admin-users add --test --yes

        echo "Deploying packages"
        pgpm deploy --yes --database "$$PGDATABASE" --package constructive
        pgpm deploy --yes --database "$$PGDATABASE" --package constructive-services
        pgpm deploy --yes --database "$$PGDATABASE" --package constructive-prod

        echo "Deploying metaschema and jobs"
        pgpm deploy --yes --database "$$PGDATABASE" --package metaschema
        pgpm deploy --yes --database "$$PGDATABASE" --package pgpm-database-jobs

        echo "Done (core packages)"

  # Deploy the local constructive-infra package and seed function definitions.
  # This runs after db-setup and mounts the local pgpm/ and scripts/ dirs.
  platform-setup:
    image: ghcr.io/constructive-io/constructive:latest
    depends_on:
      db-setup:
        condition: service_completed_successfully
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
      PGDATABASE: constructive
    volumes:
      - ./pgpm:/workspace/pgpm:ro
      - ./extensions:/workspace/extensions:ro
    entrypoint: ["bash", "-c"]
    command:
      - |
        cd /workspace/pgpm
        for mod in constructive-infra constructive-store constructive-objects constructive-fbp constructive-storage; do
          if [ -d "$$mod" ]; then
            echo "Deploying $$mod..."
            pgpm deploy --yes --database "$$PGDATABASE" --package "$$mod"
          fi
        done
        echo "Deploying constructive-infra-seed..."
        pgpm deploy --yes --database "$$PGDATABASE" --package constructive-infra-seed
        echo "Platform setup done"

  graphql-server:
    image: ghcr.io/constructive-io/constructive:latest
    depends_on:
      db-setup:
        condition: service_completed_successfully
    entrypoint: ["constructive", "server", "--host", "0.0.0.0", "--port", "3000", "--origin", "*"]
    environment:
      NODE_ENV: development
      PORT: "3000"
      SERVER_HOST: "0.0.0.0"
      SERVER_TRUST_PROXY: "true"
      SERVER_ORIGIN: "*"
      SERVER_STRICT_AUTH: "false"
      # Postgres connection
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
      PGDATABASE: constructive
      # API configuration — header-based routing (X-Api-Name, X-Database-Id)
      API_ENABLE_SERVICES: "true"
      API_EXPOSED_SCHEMAS: "metaschema_public,services_public,constructive_auth_public"
      API_IS_PUBLIC: "false"
      API_META_SCHEMAS: "metaschema_public,services_public,metaschema_modules_public,constructive_auth_public"
      API_ANON_ROLE: "administrator"
      API_ROLE_NAME: "administrator"
    ports:
      - "3002:3000"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Agentic server — LLM gateway for cloud functions.
  # Proxies OpenAI-compatible requests to a configured LLM provider.
  # Cloud functions call this via context.agent.inference() / context.agent.embed().
  # Identity headers (X-Database-Id, X-Entity-Id) are set server-side by fn-runtime.
  agentic-server:
    build:
      context: .
      dockerfile: packages/agentic-server/Dockerfile
    depends_on:
      db-setup:
        condition: service_completed_successfully
    environment:
      PORT: "3003"
      LLM_PROVIDER_URL: ${LLM_PROVIDER_URL:-http://host.docker.internal:11434}
      LLM_PROVIDER_API_KEY: ${LLM_PROVIDER_API_KEY:-}
      LLM_PROVIDER_TYPE: ${LLM_PROVIDER_TYPE:-ollama}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-}
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3003/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  pgdata:
  minio-data:
