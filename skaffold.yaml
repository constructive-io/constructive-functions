apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: constructive-functions

profiles:
  # Plain k8s (Deployments + Services) — no Knative operators needed.
  - name: local-simple
    build:
      artifacts:
        - image: constructive-functions
          context: .
          docker:
            dockerfile: Dockerfile.dev
          sync:
            manual:
              - src: 'functions/**/*.ts'
                dest: /usr/src/app
              - src: 'generated/**/*.ts'
                dest: /usr/src/app
      local:
        push: false
    manifests:
      # Infrastructure (postgres, minio, servers, secrets, job-service)
      kustomize:
        paths:
          - k8s/overlays/local-simple
      # Function deployments — generated by `pnpm generate` from
      # templates/node-graphql/k8s/local-deployment.yaml.
      # When adding a new function:
      #   1. Create functions/<name>/handler.json
      #   2. Run `pnpm generate`
      #   3. Add generated/<name>/k8s/local-deployment.yaml here
      #   4. Add a portForward entry below
      rawYaml:
        - generated/simple-email/k8s/local-deployment.yaml
        - generated/send-email-link/k8s/local-deployment.yaml
        - generated/rag-embedding/k8s/local-deployment.yaml
        - generated/rag-embedding-sql/k8s/local-deployment.yaml
    deploy:
      kubectl:
        defaultNamespace: constructive-functions
    portForward:
      - resourceType: service
        resourceName: simple-email
        namespace: constructive-functions
        port: 80
        localPort: 8081
      - resourceType: service
        resourceName: send-email-link
        namespace: constructive-functions
        port: 80
        localPort: 8082
      - resourceType: service
        resourceName: rag-embedding
        port: 80
        localPort: 8083
      - resourceType: service
        resourceName: rag-embedding-sql
        port: 80
        localPort: 8084
      - resourceType: service
        resourceName: knative-job-service
        port: 8080
        localPort: 8080
      - resourceType: service
        resourceName: postgres
        port: 5432
        localPort: 5432
      - resourceType: service
        resourceName: constructive-server
        port: 3000
        localPort: 3002

  # Full Knative setup — requires `cd k8s && make operators-knative-only` first.
  - name: local
    build:
      artifacts:
        - image: constructive-functions
          context: .
          docker:
            dockerfile: Dockerfile.dev
          sync:
            manual:
              - src: 'functions/**/*.ts'
                dest: /usr/src/app
      local:
        push: false
    manifests:
      kustomize:
        paths:
          - k8s/overlays/local
    portForward:
      - resourceType: service
        resourceName: simple-email
        port: 80
        localPort: 8081
      - resourceType: service
        resourceName: send-email-link
        port: 80
        localPort: 8082
      - resourceType: service
        resourceName: knative-job-service
        port: 8080
        localPort: 8080
      - resourceType: service
        resourceName: postgres
        port: 5432
        localPort: 5432
      - resourceType: service
        resourceName: constructive-server
        port: 3000
        localPort: 3002
