# AUTO-GENERATED by scripts/generate.ts — do not edit manually.
# To add a function, create functions/<name>/handler.json and run `pnpm generate`.
apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: constructive-functions

profiles:
  # Per-function profiles (infra + single function).
  - name: knative-job-example
    build:
      artifacts:
        - image: constructive-functions
          context: .
          docker:
            dockerfile: Dockerfile.dev
          sync:
            manual:
              - src: 'functions/**/*.ts'
                dest: /usr/src/app
      local:
        push: false
    manifests:
      kustomize:
        paths:
          - generated/example/k8s/skaffold-overlay
      rawYaml:
        - generated/example/k8s/local-deployment.yaml
    deploy:
      kubectl:
        defaultNamespace: constructive-functions
    portForward:
      - resourceType: service
        resourceName: knative-job-example
        namespace: constructive-functions
        port: 80
        localPort: 8083
      - resourceType: service
        resourceName: knative-job-service
        namespace: constructive-functions
        port: 8080
        localPort: 8080
      - resourceType: service
        resourceName: postgres
        namespace: constructive-functions
        port: 5432
        localPort: 5432
      - resourceType: service
        resourceName: constructive-server
        namespace: constructive-functions
        port: 3000
        localPort: 3002
