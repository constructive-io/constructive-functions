# AUTO-GENERATED by scripts/generate.ts — do not edit manually.
# To add a function, create functions/<name>/handler.json and run `pnpm generate`.
apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: constructive-functions

profiles:
  # Per-function profiles (infra + single function).
{{per_function_profiles}}

  # All functions together.
  - name: local-simple
    build:
      artifacts:
        - image: constructive-functions
          context: .
          docker:
            dockerfile: Dockerfile.dev
          sync:
            manual:
              - src: 'functions/**/*.ts'
                dest: /usr/src/app
{{python_artifacts}}
      local:
        push: false
    manifests:
      kustomize:
        paths:
          - k8s/overlays/local-simple
      rawYaml:
{{all_raw_yaml}}
        - generated/functions-configmap.yaml
    deploy:
      kubectl:
        defaultNamespace: {{namespace}}
    portForward:
{{all_port_forwards}}
      - resourceType: service
        resourceName: knative-job-service
        namespace: {{namespace}}
        port: 8080
        localPort: 8080
      - resourceType: service
        resourceName: postgres
        namespace: {{namespace}}
        port: 5432
        localPort: 5432
      - resourceType: service
        resourceName: constructive-server
        namespace: {{namespace}}
        port: 3000
        localPort: 3002

  # Full Knative setup — requires `cd k8s && make operators-knative-only` first.
  - name: local
    build:
      artifacts:
        - image: constructive-functions
          context: .
          docker:
            dockerfile: Dockerfile.dev
          sync:
            manual:
              - src: 'functions/**/*.ts'
                dest: /usr/src/app
      local:
        push: false
    manifests:
      kustomize:
        paths:
          - k8s/overlays/local
    portForward:
{{all_port_forwards}}
      - resourceType: service
        resourceName: knative-job-service
        namespace: {{namespace}}
        port: 8080
        localPort: 8080
      - resourceType: service
        resourceName: postgres
        namespace: {{namespace}}
        port: 5432
        localPort: 5432
      - resourceType: service
        resourceName: constructive-server
        namespace: {{namespace}}
        port: 3000
        localPort: 3002
