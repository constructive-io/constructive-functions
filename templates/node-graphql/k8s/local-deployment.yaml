apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{name}}
  labels:
    app: {{name}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{name}}
  template:
    metadata:
      labels:
        app: {{name}}
    spec:
      containers:
        - name: {{name}}
          image: constructive-functions:local
          command: ["npx"]
          args: ["tsx", "--watch", "generated/{{name}}/index.ts"]
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: pg-credentials
            - secretRef:
                name: mailgun-credentials
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "development"
            - name: LOG_LEVEL
              value: "info"
            - name: GRAPHQL_URL
              value: "http://constructive-server-admin.constructive-functions.svc.cluster.local:3000/graphql"
            - name: META_GRAPHQL_URL
              value: "http://constructive-server-admin.constructive-functions.svc.cluster.local:3000/graphql"
            - name: GRAPHQL_API_NAME
              value: "private"
            - name: DEFAULT_DATABASE_ID
              value: "constructive"
            - name: MAILGUN_FROM
              value: "no-reply@mg.constructive.io"
            - name: MAILGUN_REPLY
              value: "support@mg.constructive.io"
            - name: SIMPLE_EMAIL_DRY_RUN
              value: "true"
            - name: SEND_EMAIL_LINK_DRY_RUN
              value: "true"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: {{name}}
spec:
  selector:
    app: {{name}}
  ports:
    - port: 80
      targetPort: 8080
