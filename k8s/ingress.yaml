apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: functions-ingress
  namespace: constructive-functions
  labels:
    app: functions-runtime
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: functions.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: functions-service
            port:
              number: 80
