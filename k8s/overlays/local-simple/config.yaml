apiVersion: v1
kind: ConfigMap
metadata:
  name: constructive
data:
  PORT: "3000"
  SERVER_HOST: "0.0.0.0"
  SERVER_TRUST_PROXY: "true"
  SERVER_ORIGIN: "*"
  SERVER_STRICT_AUTH: "false"

  PGHOST: "postgres.constructive-functions.svc.cluster.local"
  PGPORT: "5432"
  PGDATABASE: "constructive"

  API_ENABLE_META: "true"
  API_EXPOSED_SCHEMAS: "collections_public,meta_public"
  API_ANON_ROLE: "administrator"
  API_ROLE_NAME: "administrator"
  API_ENABLE_SERVICES: "true"
  API_DEFAULT_DATABASE_ID: "constructive"

  LOG_TIMESTAMP: "true"

  SEND_EMAIL_DRY_RUN: "true"
  SEND_VERIFICATION_LINK_DRY_RUN: "true"
  TEXT_EMBEDDING_DRY_RUN: "true"
  RAG_EMBEDDING_DRY_RUN: "true"

  # AI/Embedding settings
  OLLAMA_URL: "http://ollama.constructive-functions.svc.cluster.local:11434"
  EMBEDDING_MODEL: "nomic-embed-text:latest"
