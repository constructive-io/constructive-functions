apiVersion: apps/v1
kind: Deployment
metadata:
  name: send-email-link
  labels:
    app: send-email-link
spec:
  replicas: 1
  selector:
    matchLabels:
      app: send-email-link
  template:
    metadata:
      labels:
        app: send-email-link
    spec:
      containers:
        - name: send-email-link
          image: constructive-functions:local
          command: ["node", "generated/send-email-link/dist/index.js"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: send-email-link
spec:
  selector:
    app: send-email-link
  ports:
    - port: 80
      targetPort: 8080
