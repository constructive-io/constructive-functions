apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: constructive-functions

resources:
  # Infrastructure
  - ./postgres-local.yaml
  - ./minio-local.yaml
  # Secrets & config
  - ./config.yaml
  - ./pg-secret.yaml
  - ./mailgun-secret.yaml
  - ./server-bucket-secret.yaml
  # Constructive servers + db setup
  - ./constructive-server.yaml
  - ./constructive-server-admin.yaml
  - ./constructive-db-job.yaml
  # Job service
  - ./job-service.yaml
  # Functions (generated from templates/node-graphql/k8s/local-deployment.yaml)
  - ../../../generated/simple-email/k8s/local-deployment.yaml
  - ../../../generated/send-email-link/k8s/local-deployment.yaml
