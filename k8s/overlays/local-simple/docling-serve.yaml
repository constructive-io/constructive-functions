apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-serve
  labels:
    app: docling-serve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docling-serve
  template:
    metadata:
      labels:
        app: docling-serve
    spec:
      containers:
        - name: docling-serve
          image: ghcr.io/ds4sd/docling-serve:latest
          ports:
            - containerPort: 5001
          env:
            - name: DOCLING_SERVE_ENABLE_UI
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: docling-serve
spec:
  selector:
    app: docling-serve
  ports:
    - port: 5001
      targetPort: 5001
