apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-email
  labels:
    app: simple-email
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-email
  template:
    metadata:
      labels:
        app: simple-email
    spec:
      containers:
        - name: simple-email
          image: constructive-functions:local
          command: ["node", "generated/simple-email/dist/index.js"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: simple-email
spec:
  selector:
    app: simple-email
  ports:
    - port: 80
      targetPort: 8080
