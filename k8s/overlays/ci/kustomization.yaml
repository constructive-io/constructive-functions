apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: constructive-functions

resources:
  - ../local

patches:
  # CI-specific resource tuning (smaller, requests = limits)
  - path: ./constructive/server.yaml
  - path: ./constructive/dashboard.yaml
  - path: ./constructive/knative-job-service.yaml
  - path: ./constructive/postgres.yaml
  # Scale down non-essential components
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
    target:
      group: apps
      version: v1
      kind: Deployment
      name: pgadmin
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 0
    target:
      group: apps
      version: v1
      kind: Deployment
      name: minio
  # constructive-server-admin and simple-email are kept running for e2e tests
