apiVersion: v1
kind: ConfigMap
metadata:
  name: functions-config
  namespace: constructive-functions
  labels:
    app: functions-runtime
data:
  # NOTE: This is an example ConfigMap for function configurations
  # In production, consider using persistent volumes or a source repository
  # Functions can be loaded from this ConfigMap by mounting it as a volume
  hello-world.js: |
    module.exports = async function handler(req, res) {
      const { name = 'World' } = req.query;
      
      return res.status(200).json({
        message: `Hello, ${name}!`,
        timestamp: new Date().toISOString(),
      });
    };
