apiVersion: v1
kind: ConfigMap
metadata:
  name: functions-config
  namespace: constructive-functions
  labels:
    app: functions-runtime
data:
  # Add your function configurations here
  # Functions can be loaded from this ConfigMap
  hello-world.js: |
    module.exports = async function handler(req, res) {
      const { name = 'World' } = req.query;
      
      return res.status(200).json({
        message: `Hello, ${name}!`,
        timestamp: new Date().toISOString(),
      });
    };
