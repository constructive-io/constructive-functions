---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: postgres-db
  labels:
    app.interweb.dev/managed: "true"
    app.kubernetes.io/name: postgres-cluster
    app.kubernetes.io/component: database
spec:
  instances: 1
  #imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  imageName: ghcr.io/launchql/pgvector-postgis:16.10
  imagePullPolicy: Always
  #imageName: pyramation/pgvector:13.3-alpine
  enablePDB: false
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser
  ## temp hack to allow local connections, later should use tls or other auth
  postgresql:  
    pg_hba:  
      - host all postgres all scram-sha-256  
      - host all appuser all scram-sha-256
  storage:
    size: 6Gi
  resources:
    requests:
      cpu: 2000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 4Gi
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      encoding: UTF8
      localeCollate: en_US.UTF-8
      localeCType: en_US.UTF-8
      secret:
        name: postgres-superuser
  monitoring:
    enablePodMonitor: false
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: preferred
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: postgres-pooler
  namespace: postgres-db
  labels:
    app.interweb.dev/managed: "true"
    app.kubernetes.io/name: postgres-pooler
    app.kubernetes.io/component: connection-pooler
spec:
  cluster:
    name: postgres-cluster
  instances: 1
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      default_pool_size: "10"
      max_client_conn: "100"
      max_db_connections: "10"
      max_user_connections: "10"
      server_reset_query: DISCARD ALL
      log_connections: "1"
      log_disconnections: "1"
      log_pooler_errors: "1"
      server_idle_timeout: "30"
      client_idle_timeout: "60"
      server_login_retry: "5"
      query_timeout: "30"
      ignore_startup_parameters: extra_float_digits
      application_name_add_host: "1"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-pooler
        app.kubernetes.io/component: connection-pooler
    spec:
      containers:
        - name: pgbouncer
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 400m
              memory: 1024Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    cnpg.io/poolerName: postgres-pooler
                topologyKey: kubernetes.io/hostname
