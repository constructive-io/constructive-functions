apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: llm-internal-calvin
  labels:
    app.kubernetes.io/name: llm-internal-calvin
    app.kubernetes.io/component: function
    app.kubernetes.io/part-of: constructive-jobs
    networking.knative.dev/visibility: cluster-local
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-internal-calvin
        app.kubernetes.io/component: function
        app.kubernetes.io/part-of: constructive-jobs
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        serving.knative.dev/timeout: "300s"
    spec:
      containerConcurrency: 10
      timeoutSeconds: 300
      containers:
      - name: function
        image: ghcr.io/constructive-io/constructive:latest
        imagePullPolicy: Always
        command: ["node"]
        args: ["functions/llm-internal-calvin/dist/index.js"]
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: CALVIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: calvin-credentials
              key: api-key
              optional: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
