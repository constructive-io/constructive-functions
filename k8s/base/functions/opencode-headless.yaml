apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: opencode-headless
  labels:
    app.kubernetes.io/name: opencode-headless
    app.kubernetes.io/component: function
    app.kubernetes.io/part-of: constructive-jobs
    networking.knative.dev/visibility: cluster-local
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opencode-headless
        app.kubernetes.io/component: function
        app.kubernetes.io/part-of: constructive-jobs
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        serving.knative.dev/timeout: "300s"
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containerConcurrency: 10
      timeoutSeconds: 300
      containers:
      - name: function
        image: ghcr.io/constructive-io/constructive:latest
        imagePullPolicy: Always
        command: ["node"]
        args: ["functions/opencode-headless/dist/index.js"]
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
