apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: rust-hello-world
  labels:
    app.kubernetes.io/name: rust-hello-world
    app.kubernetes.io/component: function
    app.kubernetes.io/part-of: constructive-jobs
    networking.knative.dev/visibility: cluster-local
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rust-hello-world
        app.kubernetes.io/component: function
        app.kubernetes.io/part-of: constructive-jobs
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        serving.knative.dev/timeout: "300s"
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containerConcurrency: 10
      timeoutSeconds: 300
      containers:
      - name: function
        image: ghcr.io/constructive-io/rust-hello-world:latest
        imagePullPolicy: Always
        command: ["./app"]
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
