apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: pytorch-gpu
  labels:
    app.kubernetes.io/name: pytorch-gpu
    app.kubernetes.io/component: function
    app.kubernetes.io/part-of: constructive-jobs
    networking.knative.dev/visibility: cluster-local
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pytorch-gpu
        app.kubernetes.io/component: function
        app.kubernetes.io/part-of: constructive-jobs
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        serving.knative.dev/timeout: "300s"
    spec:
      containerConcurrency: 1
      timeoutSeconds: 300
      containers:
      - name: function
        image: ghcr.io/constructive-io/pytorch-gpu:latest
        imagePullPolicy: Always
        command: ["python", "src/main.py"]
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: "1"
