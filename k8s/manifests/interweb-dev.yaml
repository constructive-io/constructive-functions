apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: function
    app.kubernetes.io/name: send-email-link
    app.kubernetes.io/part-of: constructive-jobs
    networking.knative.dev/visibility: cluster-local
  name: send-email-link
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/target: "50"
        run.googleapis.com/cpu-throttling: "false"
        serving.knative.dev/timeout: 300s
      labels:
        app.kubernetes.io/component: function
        app.kubernetes.io/name: send-email-link
        app.kubernetes.io/part-of: constructive-jobs
    spec:
      containerConcurrency: 10
      containers:
      - args:
        - functions/send-email-link/dist/index.js
        command:
        - node
        env:
        - name: NODE_ENV
          value: production
        - name: LOG_LEVEL
          value: debug
        - name: LOG_TIMESTAMP
          value: "true"
        - name: MAILGUN_FROM
          value: no-reply@mg.constructive.io
        - name: MAILGUN_REPLY
          value: support@mg.constructive.io
        - name: GRAPHQL_URL
          value: https://admin.launchql.dev/graphql
        - name: META_GRAPHQL_URL
          value: https://admin.launchql.dev/graphql
        envFrom:
        - secretRef:
            name: mailgun-credentials
        image: ghcr.io/constructive-io/constructive:07dd24c
        imagePullPolicy: Always
        name: function
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      timeoutSeconds: 300
      volumes:
      - emptyDir: {}
        name: tmp
  traffic:
  - latestRevision: true
    percent: 100
