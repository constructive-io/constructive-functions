apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  labels:
    app.interweb.dev/managed: "true"
    app.kubernetes.io/component: database
    app.kubernetes.io/name: postgres-cluster
  name: postgres-cluster
  namespace: postgres-db
spec:
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname
  bootstrap:
    initdb:
      database: postgres
      encoding: UTF8
      localeCType: en_US.UTF-8
      localeCollate: en_US.UTF-8
      owner: postgres
      secret:
        name: postgres-superuser
  enablePDB: false
  enableSuperuserAccess: true
  imageName: ghcr.io/launchql/pgvector-postgis:16.10
  imagePullPolicy: Always
  instances: 1
  monitoring:
    enablePodMonitor: false
  postgresql:
    pg_hba:
    - host all postgres all scram-sha-256
    - host all appuser all scram-sha-256
  resources:
    limits:
      cpu: 4000m
      memory: 4Gi
    requests:
      cpu: 2000m
      memory: 2Gi
  storage:
    size: 6Gi
  superuserSecret:
    name: postgres-superuser
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  labels:
    app.interweb.dev/managed: "true"
    app.kubernetes.io/component: connection-pooler
    app.kubernetes.io/name: postgres-pooler
  name: postgres-pooler
  namespace: postgres-db
spec:
  cluster:
    name: postgres-cluster
  instances: 1
  pgbouncer:
    parameters:
      application_name_add_host: "1"
      client_idle_timeout: "60"
      default_pool_size: "10"
      ignore_startup_parameters: extra_float_digits
      log_connections: "1"
      log_disconnections: "1"
      log_pooler_errors: "1"
      max_client_conn: "100"
      max_db_connections: "10"
      max_user_connections: "10"
      query_timeout: "30"
      server_idle_timeout: "30"
      server_login_retry: "5"
      server_reset_query: DISCARD ALL
    poolMode: transaction
  template:
    metadata:
      labels:
        app.kubernetes.io/component: connection-pooler
        app.kubernetes.io/name: postgres-pooler
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  cnpg.io/poolerName: postgres-pooler
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - name: pgbouncer
        resources:
          limits:
            cpu: 400m
            memory: 1024Mi
          requests:
            cpu: 200m
            memory: 512Mi
  type: rw
