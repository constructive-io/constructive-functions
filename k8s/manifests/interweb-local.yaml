apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: function
    app.kubernetes.io/name: send-verification-link
    app.kubernetes.io/part-of: constructive-jobs
    networking.knative.dev/visibility: cluster-local
  name: send-verification-link
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/target: "50"
        run.googleapis.com/cpu-throttling: "false"
        serving.knative.dev/timeout: 300s
      labels:
        app.kubernetes.io/component: function
        app.kubernetes.io/name: send-verification-link
        app.kubernetes.io/part-of: constructive-jobs
    spec:
      containerConcurrency: 10
      containers:
      - env:
        - name: NODE_ENV
          value: development
        - name: LOG_LEVEL
          value: debug
        - name: LOCAL_APP_PORT
          value: "3000"
        - name: SEND_VERIFICATION_LINK_DRY_RUN
          value: "true"
        - name: MAILGUN_FROM
          value: no-reply@mailgun.example.com
        - name: MAILGUN_REPLY
          value: support@mailgun.example.com
        name: function
      timeoutSeconds: 300
      volumes:
      - emptyDir: {}
        name: tmp
  traffic:
  - latestRevision: true
    percent: 100
---
