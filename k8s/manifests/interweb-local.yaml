apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: knative-job-service
    app.kubernetes.io/component: jobs
    app.kubernetes.io/name: knative-job-service
    app.kubernetes.io/part-of: constructive-jobs
  name: knative-job-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knative-job-service
  template:
    metadata:
      labels:
        app: knative-job-service
        app.kubernetes.io/component: jobs
        app.kubernetes.io/name: knative-job-service
        app.kubernetes.io/part-of: constructive-jobs
    spec:
      containers:
      - args:
        - jobs/knative-job-service/dist/run.js
        command:
        - node
        env:
        - name: NODE_ENV
          value: development
        - name: KNATIVE_SERVICE_URL
          value: default.svc.cluster.local
        - name: INTERNAL_JOBS_CALLBACK_URL
          value: http://knative-job-service.default.svc.cluster.local:8080
        - name: JOBS_CALLBACK_HOST
          value: knative-job-service.default.svc.cluster.local
        - name: JOBS_CALLBACK_BASE_URL
          value: http://knative-job-service.default.svc.cluster.local:8080/callback
        - name: INTERNAL_GATEWAY_URL
          value: http://send-email.default.svc.cluster.local
        - name: INTERNAL_GATEWAY_DEVELOPMENT_MAP
          value: '{"send-email":"http://send-email.default.svc.cluster.local","send-verification-link":"http://send-verification-link.default.svc.cluster.local"}'
        - name: INTERNAL_JOBS_CALLBACK_PORT
          value: "8080"
        - name: JOBS_SUPPORT_ANY
          value: "false"
        - name: JOBS_SUPPORTED
          value: send-email,send-verification-link
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        envFrom:
        - configMapRef:
            name: constructive
        - secretRef:
            name: pg-credentials
        image: ghcr.io/constructive-io/constructive:latest
        imagePullPolicy: Always
        name: knative-job-service
        ports:
        - containerPort: 8080
          name: jobs-http
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
---
