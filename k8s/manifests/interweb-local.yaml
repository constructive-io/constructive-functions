apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: pgadmin
  name: pgadmin
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
      - env:
        - name: PGADMIN_DEFAULT_EMAIL
          value: admin@constructive.dev
        - name: PGADMIN_LISTEN_PORT
          value: "80"
        - name: PGADMIN_CONFIG_SERVER_MODE
          value: "True"
        - name: PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED
          value: "False"
        - name: PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION
          value: "False"
        - name: PGADMIN_CONFIG_ALLOW_SAVE_PASSWORD
          value: "True"
        - name: PGADMIN_CONFIG_PROXY_X_FORWARDED_HOST
          value: "True"
        - name: PGADMIN_CONFIG_PROXY_X_FORWARDED_PROTO
          value: "True"
        envFrom:
        - secretRef:
            name: pgadmin-credentials
        image: dpage/pgadmin4:latest
        imagePullPolicy: Always
        name: pgadmin
        ports:
        - containerPort: 80
          name: http
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - mountPath: /var/lib/pgadmin
          name: pgadmin-data
        - mountPath: /pgadmin4/servers.json
          name: pgadmin-servers
          subPath: servers.json
      volumes:
      - emptyDir: {}
        name: pgadmin-data
      - configMap:
          name: pgadmin-servers
        name: pgadmin-servers
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: postgres
  name: postgres
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - env:
        - name: POSTGRES_DB
          value: launchql
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: PGUSER
              name: pg-credentials
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: PGPASSWORD
              name: pg-credentials
        image: ghcr.io/launchql/pgvector-postgis:16.10
        imagePullPolicy: IfNotPresent
        name: postgres
        ports:
        - containerPort: 5432
          name: postgres
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: constructive-db
  namespace: default
spec:
  backoffLimit: 6
  template:
    spec:
      containers:
      - args:
        - |
          cd /app
          echo "Creating database $PGDATABASE"
          createdb -h "$PGHOST" -U "$PGUSER" "$PGDATABASE" || true

          echo "Applying bootstrap roles"
          pgpm admin-users bootstrap --yes
          pgpm admin-users add --test --yes

          echo "Deploying Services"
          pgpm deploy --yes --database "$PGDATABASE" --package app-svc-prod

          export LAUNCHQL_DOMAIN="${LAUNCHQL_DOMAIN:-launchql.dev}"
          echo "Rename domains to ${LAUNCHQL_DOMAIN}"
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -v ON_ERROR_STOP=1 \
            -c "BEGIN;
                UPDATE services_public.domains
                  SET domain = '${LAUNCHQL_DOMAIN}'
                WHERE domain = ANY(ARRAY['lql.io', 'constructive.io', 'dbe.la', 'localhost']);
                COMMIT;"

          echo "Continue with db-meta and pgpm-database-jobs"
          pgpm deploy --yes --database "$PGDATABASE" --package metaschema
          pgpm deploy --yes --database "$PGDATABASE" --package pgpm-database-jobs

          echo "Done"
        command:
        - bash
        - -c
        env:
        - name: LAUNCHQL_DOMAIN
          value: localhost
        envFrom:
        - configMapRef:
            name: constructive
        - secretRef:
            name: pg-credentials
        image: ghcr.io/constructive-io/constructive-db-job:latest
        imagePullPolicy: Always
        name: lql
      imagePullSecrets:
      - name: ghcr-pull
      restartPolicy: OnFailure
