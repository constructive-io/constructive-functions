apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: constructive-server
  name: constructive-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: constructive-server
  template:
    metadata:
      labels:
        app: constructive-server
    spec:
      containers:
      - args:
        - server
        - --port
        - "3000"
        - --origin
        - '*'
        - --strictAuth
        - "false"
        command:
        - cnc
        env:
        - name: MINIO_ENDPOINT
          value: http://minio:9000
        - name: BUCKET_NAME
          value: constructive-uploads
        - name: AWS_REGION
          value: us-east-1
        - name: LOG_LEVEL
          value: debug
        envFrom:
        - configMapRef:
            name: constructive
        - secretRef:
            name: pg-credentials
        - secretRef:
            name: constructive-uploads
        image: ghcr.io/constructive-io/constructive:latest
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: server-http
          initialDelaySeconds: 10
          periodSeconds: 20
        name: server
        ports:
        - containerPort: 3000
          name: server-http
        readinessProbe:
          httpGet:
            path: /healthz
            port: server-http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 300m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
      - args:
        - explorer
        - --port
        - "3001"
        - --origin
        - '*'
        command:
        - cnc
        env:
        - name: PORT
          value: "3001"
        envFrom:
        - configMapRef:
            name: constructive
        - secretRef:
            name: pg-credentials
        image: ghcr.io/constructive-io/constructive:latest
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: explorer-http
          initialDelaySeconds: 10
          periodSeconds: 20
        name: explorer
        ports:
        - containerPort: 3001
          name: explorer-http
        readinessProbe:
          httpGet:
            path: /healthz
            port: explorer-http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
---
