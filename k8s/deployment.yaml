apiVersion: apps/v1
kind: Deployment
metadata:
  name: functions-runtime
  namespace: constructive-functions
  labels:
    app: functions-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: functions-runtime
  template:
    metadata:
      labels:
        app: functions-runtime
    spec:
      containers:
      - name: functions-runtime
        # NOTE: Replace with your custom functions runtime image
        # This is a placeholder image that will exit immediately without a proper command
        image: node:18-alpine
        imagePullPolicy: IfNotPresent
        # REQUIRED: Add a command to start your functions runtime server
        # Example command for a custom runtime:
        # command: ["node", "server.js"]
        # For testing, you can use: command: ["sh", "-c", "while true; do sleep 30; done"]
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        # NOTE: Uncomment health checks after implementing these endpoints in your runtime
        # livenessProbe:
        #   httpGet:
        #     path: /health
        #     port: 3000
        #   initialDelaySeconds: 30
        #   periodSeconds: 10
        # readinessProbe:
        #   httpGet:
        #     path: /ready
        #     port: 3000
        #   initialDelaySeconds: 5
        #   periodSeconds: 5
        volumeMounts:
        - name: functions
          mountPath: /app/functions
          readOnly: true
      volumes:
      - name: functions
        configMap:
          name: functions-config
