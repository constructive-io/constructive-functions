name: ORM SDK Update

# Regenerates the typed ORM (schema + SDK + skill) and, if anything changed,
# opens a PR with the fresh output. Run this manually after editing the
# `pgpm/constructive-infra` module so you don't have to regenerate locally.
#
# FLOW:
#   1. generate: call the reusable generate-orm workflow (single source of truth)
#   2. update:   if anything changed, download the artifact and open a PR

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag/SHA to regenerate from (default: main)'
        required: false
        default: 'main'
      create_pr:
        description: 'Open a PR with the changes (otherwise just validate)'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    uses: ./.github/workflows/generate-orm.yml
    with:
      ref: ${{ inputs.ref || 'main' }}

  update:
    needs: generate
    if: needs.generate.outputs.has_changes == 'true' && inputs.create_pr != false
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0

      # Clean generated dirs before downloading the artifact so stale files that
      # codegen no longer produces are removed.
      - name: Clean generated dirs
        run: |
          rm -rf sdk/functions-schema/schemas sdk/functions-schema/src \
                 sdk/functions-sdk/src .agents/skills/orm-infra

      - name: Download generated ORM tree
        uses: actions/download-artifact@v4
        with:
          name: generated-orm-tree
          path: .

      - name: Check for changes
        id: check
        run: |
          PATHS="sdk/functions-schema/schemas sdk/functions-schema/src sdk/functions-sdk/src .agents/skills"
          UNTRACKED=$(git ls-files --others --exclude-standard $PATHS | head -20)
          if git diff --quiet -- $PATHS && [ -z "$UNTRACKED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch and PR
        id: create_pr
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_NAME="chore/regenerate-orm-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          git add sdk/functions-schema/schemas sdk/functions-schema/src \
                  sdk/functions-sdk/src .agents/skills/orm-infra
          git commit -m "chore: regenerate ORM schema + SDK

          Auto-generated by the ORM SDK Update workflow.
          Source: ${{ needs.generate.outputs.ref_sha }} (ref: ${{ inputs.ref || 'main' }})"
          git push origin "$BRANCH_NAME"

          PR_URL=$(gh pr create \
            --title "chore: regenerate ORM schema + SDK" \
            --body "## Automated ORM Regeneration

          Created by the [ORM SDK Update workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/sdk-update.yml).

          ### What was regenerated
          - \`sdk/functions-schema/schemas/*.graphql\` — exported GraphQL SDL
          - \`sdk/functions-schema/src/\` — API name index
          - \`sdk/functions-sdk/src/\` — typed ORM client
          - \`.agents/skills/orm-infra/\` — skill reference docs

          Source commit: \`${{ needs.generate.outputs.ref_sha }}\`

          ---
          *Auto-generated by the constructive-functions ORM SDK Update workflow*" \
            --base "${{ inputs.ref || 'main' }}" \
            --head "$BRANCH_NAME")

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"

      - name: Summary
        if: steps.create_pr.outputs.pr_url != ''
        run: |
          {
            echo "## ORM SDK Update PR Created"
            echo ""
            echo "${{ steps.create_pr.outputs.pr_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
