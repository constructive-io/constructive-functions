name: pgpm integration tests

on:
  push:
    branches: [main]
    paths:
      - 'pgpm/**'
      - 'pgpm.json'
      - '.github/workflows/pgpm-test.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'pgpm/**'
      - 'pgpm.json'
      - '.github/workflows/pgpm-test.yaml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pgpm-test:
    name: pgpm deploy test
    runs-on: ubuntu-latest

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: password

    services:
      pg_db:
        image: constructiveio/postgres-plus:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pgpm CLI
        run: npm install -g pgpm

      - name: Seed pg users
        run: pgpm admin-users bootstrap --yes

      - name: Install pgpm module dependencies
        run: |
          for mod in pgpm/*/; do
            if [ -f "$mod"/*.control ]; then
              echo "Installing deps for $mod"
              cd "$mod" && pgpm install && cd ../.. || cd ../..
            fi
          done

      - name: Run pgpm full-cycle test (deploy/verify/revert/deploy)
        run: pgpm test-packages --full-cycle --exclude constructive-infra-services
